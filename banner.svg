<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <rect width="1200" height="400" fill="#070a0f"/>
  
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&amp;family=Syne:wght@400;700;800&amp;display=swap');
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ff88" stroke-width="1" stroke-opacity="0.04"/>
    </pattern>
    
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c0ff" />
      <stop offset="100%" stop-color="#00ff88" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="400" fill="url(#grid)"/>

  <!-- Centered Shield Icon -->
  <g transform="translate(600, 50) scale(0.6) translate(-100, -20)">
    <path d="M100 20 L180 50 L180 130 C180 190 140 240 100 270 C60 240 20 190 20 130 L20 50 Z" 
          fill="none" stroke="url(#shieldGrad)" stroke-width="6" stroke-linejoin="round"/>
    <text x="100" y="165" font-family="'JetBrains Mono', monospace" font-size="65" fill="#00ff88" font-weight="bold" text-anchor="middle">&gt;_</text>
  </g>

  <!-- Centered Title -->
  <text x="600" y="240" font-family="'Syne', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="56" fill="#ffffff" font-weight="800" letter-spacing="-1.5" text-anchor="middle">
    SmartContract <tspan fill="#00ff88">VulnHunter</tspan>
  </text>
  
  <!-- Centered Subtitle -->
  <text x="600" y="285" font-family="'JetBrains Mono', monospace" font-size="20" fill="#6a7585" letter-spacing="1" text-anchor="middle">
    The ultimate smart contract security CLI framework
  </text>
  
  <!-- Centered Badges -->
  <g transform="translate(452.5, 315)">
    <rect x="0" y="0" width="85" height="30" rx="15" fill="#00c0ff" fill-opacity="0.12" stroke="#00c0ff" stroke-opacity="0.3" stroke-width="1"/>
    <text x="42.5" y="19" font-family="'JetBrains Mono', monospace" font-size="13" fill="#00c0ff" font-weight="500" text-anchor="middle">15+ Tools</text>
    
    <rect x="105" y="0" width="85" height="30" rx="15" fill="#00ff88" fill-opacity="0.12" stroke="#00ff88" stroke-opacity="0.3" stroke-width="1"/>
    <text x="147.5" y="19" font-family="'JetBrains Mono', monospace" font-size="13" fill="#00ff88" font-weight="500" text-anchor="middle">AI-Driven</text>

    <rect x="210" y="0" width="85" height="30" rx="15" fill="#ff6b35" fill-opacity="0.12" stroke="#ff6b35" stroke-opacity="0.3" stroke-width="1"/>
    <text x="252.5" y="19" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ff6b35" font-weight="500" text-anchor="middle">PoC Gen</text>
  </g>
</svg>
